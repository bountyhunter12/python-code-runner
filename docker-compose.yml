version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: python-runner-backend
    ports:
      - "8000:8000"
    # Mount Docker socket so backend can spawn child containers
    # This is required for code execution sandboxing
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Allow Docker-in-Docker capabilities
    privileged: true
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: python-runner-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    restart: unless-stopped